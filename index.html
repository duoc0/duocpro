<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  
  <title>Ngày giờ trên ảnh</title>

  <!-- Full màn hình trên iPhone khi Add to Home Screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  
  <!-- iOS icon -->
  <link rel="apple-touch-icon" href="icon.png" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    body, html {
      height: 100%;
      overflow: hidden;
    }

    .background {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url('QRCODE.jpg');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      filter: brightness(1);
      z-index: -1;
    }

    .datetime1 {
      position: absolute;
      top: 161px;
      left: 50%;
      transform: translateX(-50%);
      color: black;
      font-size: 15px;
      user-select: none;
    }

    
    .blinking-text {
      position: absolute;
      top: 462.5px; /* ngay trên elapsed time */
      left: 50%;
      transform: translateX(-50%);
      color: #00A82E;
      font-size: 20px;
      user-select: none;
    }

    .elapsed-time {
      position: absolute;
      top: 492.35px;
      left: 50%;
      transform: translateX(-50%);
      color: #00A82E;
      font-size: 16px;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="background"></div>
  <div id="datetime1" class="datetime1">Loading...</div>
  <div id="blinkingText" class="blinking-text">已生效</div>
  <div id="elapsedTime" class="elapsed-time">Loading...</div>

  <script>
     function updateDateTime() {
  const now = new Date();

  const yyyy = now.getFullYear();
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');

  const hh = String(now.getHours()).padStart(2, '0');
  const mi = String(now.getMinutes()).padStart(2, '0');
  const ss = String(now.getSeconds()).padStart(2, '0');

  const dateTimeFull = `${yyyy}-${mm}-${dd} ${hh}:${mi}:${ss}`;
  document.getElementById('datetime1').textContent = dateTimeFull;

  // === TÍNH MỐC THỜI GIAN GẦN NHẤT CHIA HẾT CHO 12 GIỜ TỪ 08:00 ===
  const hour = now.getHours();
  let startTime;

  if (hour >= 8 && hour < 20) {
    // Trong khoảng 08:00 - 19:59:59 → mốc là 08:00 hôm nay
    startTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 8, 0, 0);
  } else if (hour >= 20) {
    // Sau 20:00 → mốc là 20:00 hôm nay
    startTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 20, 0, 0);
  } else {
    // Trước 08:00 → mốc là 20:00 hôm qua
    const yesterday = new Date(now);
    yesterday.setDate(now.getDate() - 1);
    startTime = new Date(yesterday.getFullYear(), yesterday.getMonth(), yesterday.getDate(), 20, 0, 0);
  }

  // Tính thời gian đã trôi qua từ mốc startTime
  let diff = now - startTime;
  if (diff < 0) diff = 0; // Tránh sai lệch

  const elapsedHours = String(Math.floor(diff / (1000 * 60 * 60))).padStart(2, '0');
  const elapsedMinutes = String(Math.floor((diff / (1000 * 60)) % 60)).padStart(2, '0');
  const elapsedSeconds = String(Math.floor((diff / 1000) % 60)).padStart(2, '0');

  const elapsedStr = `${elapsedHours}:${elapsedMinutes}:${elapsedSeconds}`;
  document.getElementById('elapsedTime').textContent = elapsedStr;
}


    updateDateTime();
    setInterval(updateDateTime, 1000);

    // Nhấp nháy văn bản
    setInterval(() => {
      const blinking = document.getElementById('blinkingText');
      blinking.style.visibility = (blinking.style.visibility === 'hidden') ? 'visible' : 'hidden';
    }, 500);
  </script>
</body>
</html>
